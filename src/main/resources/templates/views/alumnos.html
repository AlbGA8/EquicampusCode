<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="alumnos-view" id="view-alumnos" class="view-section">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold text-forest" th:text="#{student.list.title}">Directorio de Alumnos</h2>
        <div class="flex gap-3">
            <a th:href="@{/web/alumnos/pdf}" class="border border-red-200 bg-red-50 text-red-700 px-4 py-2.5 rounded-lg hover:bg-red-100 transition duration-200 flex items-center gap-2 shadow-sm" th:title="#{generic.button.export_pdf}">
                <i class="fa-solid fa-file-pdf text-xl"></i>
                <span class="hidden md:inline font-medium" th:text="#{generic.button.pdf}">PDF</span>
            </a>
            <button onclick="openModal('modal-nuevo-alumno')" class="bg-forest text-white px-5 py-2.5 rounded-lg shadow hover:bg-opacity-90 transition flex items-center gap-2 font-medium">
                <i class="fa-solid fa-plus"></i>
                <span th:text="#{generic.link.create}">Nuevo</span>
            </button>
        </div>
    </div>
    <div class="custom-card overflow-hidden">
        <div class="overflow-x-auto overflow-y-auto max-h-[55vh] relative">
            <table class="w-full text-left border-collapse">
                <thead class="bg-forest text-white sticky top-0 z-10">
                <tr>
                    <th class="p-4 font-semibold text-sm" th:text="#{student.table.name}">Alumno</th>
                    <th class="p-4 font-semibold text-sm" th:text="#{student.table.level}">Nivel</th>
                    <th class="p-4 font-semibold text-sm" th:text="#{student.table.horse}">Caballo</th>
                    <th class="p-4 font-semibold text-sm" th:text="#{student.table.balance}">Saldo</th>
                    <th class="p-4 font-semibold text-center text-sm" th:text="#{generic.actions}">Acciones</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="alumno : ${alumnos}" class="hover:bg-soft-sky transition duration-150">
                    <td class="px-6 py-4 flex items-center gap-3">
                        <img th:src="'https://ui-avatars.com/api/?name=' + ${alumno.nombre} + '&background=D4B081&color=fff'" class="w-8 h-8 rounded-full" />
                        <div>
                            <p class="font-bold" th:text="${alumno.nombre} + ' ' + ${alumno.apellido}">Nombre</p>
                            <p class="text-[10px] text-gray-400" th:text="${alumno.email}">email</p>
                        </div>
                    </td>
                    <td class="px-6 py-4"><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-[10px] font-bold" th:text="#{student.level.label}">NIVEL</span></td>
                    <td class="px-6 py-4 text-gray-600" th:text="#{horse.school}">Escuela</td>
                    <td class="px-6 py-4 text-emerald-600 font-bold">0.00 €</td>
                    <td class="px-6 py-4 text-right">
                        <a href="#" class="text-sand hover:text-orange-600 mx-1"><i class="fa-solid fa-pen-to-square"></i></a>
                        <a href="#" class="text-red-400 hover:text-red-600 mx-1"><i class="fa-solid fa-trash"></i></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(alumnos)}">
                    <td colspan="5" class="p-8 text-center text-gray-400 italic" th:text="#{student.list.empty}">No hay alumnos registrados.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
