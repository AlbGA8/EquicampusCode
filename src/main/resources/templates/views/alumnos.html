<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <section th:fragment="contenidoVista" id="view-alumnos">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 fw-bold text-forest m-0" th:text="#{student.list.title}">
          Directorio de Alumnos
        </h2>
        <div class="d-flex gap-2">
          <a th:href="@{/web/alumnos/pdf}" 
             class="btn btn-outline-danger d-flex align-items-center gap-2 rounded-lg px-3 py-2 shadow-sm"
             th:title="#{generic.button.export_pdf}">
            <i class="fa-solid fa-file-pdf"></i>
            <span class="d-none d-md-inline fw-medium" th:text="#{generic.button.pdf}">PDF</span>
          </a>
          
          <button hx-get="/web/alumnos/modal-nuevo" 
                  hx-target="#contenedor-modales" 
                  hx-swap="innerHTML"
                  class="btn bg-forest text-white fw-bold px-4 py-2 rounded-lg shadow-sm hover:opacity-90 transition-all">
            <i class="fas fa-plus me-1"></i> <span th:text="#{generic.button.new_student}">+ Nuevo Alumno</span>
          </button>
        </div>
      </div>

      <div class="card border-0 shadow-sm rounded-3xl overflow-hidden">
        <div class="table-responsive" style="max-height: 60vh;">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-forest text-white sticky-top z-2">
              <tr>
                <th class="ps-4 py-3 fw-semibold border-0" th:text="#{student.table.name}">Alumno</th>
                <th class="py-3 fw-semibold border-0 text-center" th:text="#{student.table.level}">Nivel</th>
                <th class="py-3 fw-semibold border-0" th:text="#{student.table.horse}">Caballo</th>
                <th class="py-3 fw-semibold border-0" th:text="#{student.table.balance}">Saldo</th>
                <th class="pe-4 py-3 fw-semibold border-0 text-end" th:text="#{generic.actions}">Acciones</th>
              </tr>
            </thead>
            
            <tbody class="border-top-0">
              <tr th:id="'alumno-fila-' + ${alumno.alumnoId.value}" th:each="alumno : ${alumnos}" class="transition-all">
                
                <td class="ps-4 py-3">
                  <div class="d-flex align-items-center gap-3">
                    <img th:src="'https://ui-avatars.com/api/?name=' + ${alumno.nombre} + '&background=D4B081&color=fff'"
                         class="rounded-circle shadow-sm" style="width: 35px; height: 35px;" />
                    <div>
                      <div class="fw-bold text-dark" th:text="${alumno.nombre} + ' ' + ${alumno.apellido}">Nombre</div>
                      <div class="text-muted small" style="font-size: 11px;" th:text="${alumno.email}">email</div>
                    </div>
                  </div>
                </td>

                <td class="text-center">
                  <span class="badge rounded-pill bg-info bg-opacity-10 text-info px-3 py-2 fw-bold" 
                        style="font-size: 10px;" th:text="#{student.level.label}">NIVEL</span>
                </td>

                <td class="text-secondary" th:text="#{horse.school}">Escuela</td>
                
                <td class="fw-bold text-success">0.00 €</td>

                <td class="pe-4 text-end">
                  <div class="d-flex justify-content-end gap-1">
                    <button th:hx-get="@{/web/alumnos/modal-edicion/{id}(id=${alumno.alumnoId.value})}"
                            hx-target="#contenedor-modales" hx-swap="innerHTML"
                            class="btn btn-link text-sand p-2 hover:bg-light rounded-circle transition-colors">
                      <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button th:hx-get="'/web/alumnos/confirmar-eliminacion/' + ${alumno.alumnoId.value}"
                            hx-target="#contenedor-modales" hx-swap="innerHTML"
                            class="btn btn-link text-danger p-2 hover:bg-danger-subtle rounded-circle transition-colors">
                      <i class="fa-solid fa-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>

              <tr th:if="${#lists.isEmpty(alumnos)}">
                <td colspan="5" class="p-5 text-center text-muted fst-italic">
                  <i class="fas fa-users-slash d-block mb-2 fs-3 opacity-25"></i>
                  <span th:text="#{student.list.empty}">No hay alumnos registrados.</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      
    </section>
  </body>
</html>
