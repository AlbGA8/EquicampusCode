<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="dashboard-view" id="view-dashboard" class="view-section active">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="custom-card p-6 flex items-center space-x-4 border-l-4 border-forest">
            <div class="bg-forest/10 p-4 rounded-xl text-forest"><i class="fas fa-horse-head text-2xl"></i></div>
            <div>
                <p class="text-xs text-gray-500 font-bold uppercase" th:text="#{menu.stables}">Pupilajes</p>
                <h3 class="text-2xl font-bold">58</h3>
            </div>
        </div>
        <div class="custom-card p-6 flex items-center space-x-4 border-l-4 border-blue-500">
            <div class="bg-blue-50 p-4 rounded-xl text-blue-600"><i class="fas fa-users text-2xl"></i></div>
            <div>
                <p class="text-xs text-gray-500 font-bold uppercase" th:text="#{menu.students}">Alumnos</p>
                <h3 class="text-2xl font-bold" th:text="${#lists.size(alumnos)}">0</h3>
            </div>
        </div>
        <div class="custom-card p-6 flex items-center space-x-4 border-l-4 border-amber-500">
            <div class="bg-amber-50 p-4 rounded-xl text-amber-600"><i class="fas fa-calendar-alt text-2xl"></i></div>
            <div>
                <p class="text-xs text-gray-500 font-bold uppercase" th:text="#{dashboard.classes_today}">Clases Hoy</p>
                <h3 class="text-2xl font-bold">24</h3>
            </div>
        </div>
        <div class="custom-card p-6 flex items-center space-x-4 border-l-4 border-emerald-500">
            <div class="bg-emerald-50 p-4 rounded-xl text-emerald-600"><i class="fas fa-euro-sign text-2xl"></i></div>
            <div>
                <p class="text-xs text-gray-500 font-bold uppercase" th:text="#{dashboard.income_month}">Caja Mes</p>
                <h3 class="text-2xl font-bold">15.8k</h3>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 custom-card overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50/30">
                <h2 class="font-bold text-gray-800" th:text="#{dashboard.schedule.title}">Próximas Clases</h2>
                <button onclick="switchView('clases')" class="text-xs font-bold bg-forest text-white px-3 py-1 rounded-full" th:text="#{generic.view_agenda}">Ver Agenda</button>
            </div>
            <div class="p-6 overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="text-gray-400 uppercase text-[10px] font-bold tracking-widest">
                    <tr>
                        <th class="pb-4" th:text="#{generic.time}">Hora</th>
                        <th class="pb-4" th:text="#{generic.activity}">Actividad</th>
                        <th class="pb-4" th:text="#{generic.arena}">Pista</th>
                        <th class="pb-4" th:text="#{generic.status}">Estado</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                    <tr>
                        <td class="py-4 font-bold text-forest">17:00</td>
                        <td class="py-4" th:text="#{activity.jump_pro}">Salto - Nivel Pro</td>
                        <td class="py-4" th:text="#{arena.main}">Principal</td>
                        <td><span class="text-[9px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold" th:text="#{status.active}">ACTIVA</span></td>
                    </tr>
                    <tr>
                        <td class="py-4 font-bold text-forest">18:30</td>
                        <td class="py-4" th:text="#{activity.kids_init}">Iniciación Niños</td>
                        <td class="py-4" th:text="#{arena.pony}">Pony Park</td>
                        <td><span class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold" th:text="#{status.next}">PRÓXIMA</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="custom-card p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-gray-800" th:text="#{dashboard.tasks.title}">Tareas de Cuadra</h2>
                <button class="text-xs text-forest font-bold hover:underline" th:text="#{generic.view_all}">Ver todas</button>
            </div>
            <div class="space-y-4">
                <div class="flex items-start gap-3 p-3 bg-red-50 rounded-lg border-l-4 border-red-500">
                    <div class="mt-0.5"><i class="fas fa-exclamation-triangle text-red-500"></i></div>
                    <div>
                        <p class="text-xs font-bold text-red-800" th:text="#{task.vaccine}">Vacuna pendiente</p>
                        <p class="text-[10px] text-red-600"><span th:text="#{horse.label}">Caballo</span>: Spirit (Box 4)</p>
                    </div>
                </div>
                </div>
            <button class="w-full mt-4 py-2 border border-gray-200 text-gray-500 rounded-lg font-bold text-xs hover:bg-gray-50 transition" th:text="#{dashboard.tasks.manage}">Gestionar Lista</button>
        </div>
    </div>
</section>
</body>
</html>
