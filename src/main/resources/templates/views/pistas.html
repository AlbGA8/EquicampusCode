<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="contenidoVista" id="view-pistas" class="container-fluid py-4">
  <div class="row g-4">
    
    <div class="col-12 col-md-6 col-xl-4">
      <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden border-top border-4 border-success transition-all hover:shadow-lg group cursor-pointer">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h3 class="h5 fw-bold text-dark m-0" th:text="#{arena.main}">Pista Principal</h3>
            <span class="badge rounded-pill bg-success bg-opacity-10 text-success px-3 py-2 fw-bold" 
                  style="font-size: 10px;" th:text="#{status.available}">DISPONIBLE</span>
          </div>

          <div class="ratio ratio-16x9 bg-light rounded-3 mb-4 overflow-hidden border border-light-subtle">
            <img src="/imagenes/salto.jpg" 
                 class="object-fit-cover transition-transform duration-700 group-hover:scale-110" 
                 alt="Pista Principal"
                 onerror="this.parentElement.innerHTML='<div class=\'d-flex align-items-center justify-content-center bg-light h-100\'><i class=\'fas fa-horse text-secondary opacity-25 fs-1\'></i></div>'">
          </div>

          <div class="vstack gap-3">
            <div class="d-flex align-items-center gap-2 text-muted small italic">
              <i class="fas fa-clock text-success"></i>
              <span th:text="#{arena.status.free_until}">Libre hasta las 18:00h</span>
            </div>
            <button class="btn btn-light text-dark fw-bold btn-sm py-2 rounded-lg hover:bg-forest hover:text-white transition-all shadow-none" 
                    th:text="#{arena.button.book}">
              Reservar Espacio
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-xl-4">
      <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden border-top border-4 border-warning transition-all hover:shadow-lg group cursor-pointer">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h3 class="h5 fw-bold text-dark m-0" th:text="#{arena.covered}">Pista Cubierta</h3>
            <span class="badge rounded-pill bg-warning bg-opacity-10 text-warning px-3 py-2 fw-bold" 
                  style="font-size: 10px;" th:text="#{status.occupied}">OCUPADA</span>
          </div>

          <div class="ratio ratio-16x9 bg-light rounded-3 mb-4 overflow-hidden border border-light-subtle">
            <img src="/imagenes/doma.jpg" 
                 class="object-fit-cover transition-transform duration-700 group-hover:scale-110" 
                 alt="Pista Cubierta"
                 onerror="this.parentElement.innerHTML='<div class=\'d-flex flex-column align-items-center justify-content-center bg-warning-subtle h-100\'><p class=\'text-warning-emphasis fw-bold m-0 small\'>Clase Doma</p></div>'">
          </div>

          <div class="vstack gap-3">
            <div class="d-flex align-items-center gap-2 text-muted small italic">
              <i class="fas fa-user-tie text-warning"></i>
              <span>Prof: Carlos M. (Nivel Avanzado)</span>
            </div>
            <button class="btn btn-light text-dark fw-bold btn-sm py-2 rounded-lg hover:bg-forest hover:text-white transition-all shadow-none" 
                    th:text="#{generic.button.details}">
              Ver Detalles
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-xl-4">
      <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden border-top border-4 border-success transition-all hover:shadow-lg group cursor-pointer">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h3 class="h5 fw-bold text-dark m-0" th:text="#{arena.pony}">Pony Park</h3>
            <span class="badge rounded-pill bg-success bg-opacity-10 text-success px-3 py-2 fw-bold" 
                  style="font-size: 10px;" th:text="#{status.available}">DISPONIBLE</span>
          </div>

          <div class="ratio ratio-16x9 bg-light rounded-3 mb-4 overflow-hidden border border-light-subtle">
            <img src="/imagenes/ponypark.jpg" 
                 class="object-fit-cover transition-transform duration-700 group-hover:scale-110" 
                 alt="Pony Park"
                 onerror="this.parentElement.innerHTML='<div class=\'d-flex align-items-center justify-content-center bg-light h-100\'><i class=\'fas fa-child text-secondary opacity-25 fs-1\'></i></div>'">
          </div>

          <div class="vstack gap-3">
            <div class="d-flex align-items-center gap-2 text-muted small italic">
              <i class="fas fa-tools text-success"></i>
              <span th:text="#{arena.status.maintenance}">Mantenimiento mañana 10:00</span>
            </div>
            <button class="btn btn-light text-dark fw-bold btn-sm py-2 rounded-lg hover:bg-forest hover:text-white transition-all shadow-none" 
                    th:text="#{generic.button.check}">
              Consultar
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
</body>
</html>
