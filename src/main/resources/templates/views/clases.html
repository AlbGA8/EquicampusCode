<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="contenidoVista" id="view-clases" class="container-fluid py-4">
  <div class="row g-4">
    
    <div class="col-lg-9">
      <div class="card border-0 shadow-sm rounded-3xl p-4 h-100">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="h4 fw-bold text-forest m-0" th:text="#{schedule.calendar.title}">
            Calendario de Reservas
          </h2>
          <div class="btn-group shadow-sm">
            <button class="btn btn-outline-light text-dark border-gray-200">
              <i class="fas fa-chevron-left"></i>
            </button>
            <span class="btn btn-light border-gray-200 fw-bold px-4 disabled opacity-100" th:text="#{generic.date.jan2024}">
              Enero 2024
            </span>
            <button class="btn btn-outline-light text-dark border-gray-200">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>

        <div class="row g-2 text-center mb-2">
          <div th:each="day : ${ {'mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'} }" 
               class="col text-xs fw-bold text-muted tracking-widest uppercase" 
               th:text="#{day.__${day}__}">LUN</div>
        </div>

        <div class="row g-2 overflow-auto" style="min-height: 500px;">
          
          <div class="col border-end border-light-subtle px-1">
            <div class="vstack gap-2">
              <div class="badge text-start p-2 border-start border-4 border-primary bg-primary bg-opacity-10 text-primary rounded-1">
                <div class="fw-bold">09:00</div>
                <div class="small">Doma - Carlos</div>
              </div>
              <div class="badge text-start p-2 border-start border-4 border-warning bg-warning bg-opacity-10 text-warning rounded-1">
                <div class="fw-bold">17:00</div>
                <div class="small">Salto - Lucía</div>
              </div>
            </div>
          </div>

          <div class="col border-end border-light-subtle px-1 text-center">
             <span class="text-muted opacity-25 mt-4 d-block small">Sin eventos</span>
          </div>

          <div class="col border-end border-light-subtle px-1">
            <div class="badge text-start p-2 border-start border-4 border-info bg-info bg-opacity-10 text-info rounded-1">
              <div class="fw-bold">10:00</div>
              <div class="small">Pony Club</div>
            </div>
          </div>

          <div class="col border-end border-light-subtle px-1">
            <div class="vstack gap-2">
              <div class="badge text-start p-2 border-start border-4 border-primary bg-primary bg-opacity-10 text-primary rounded-1">
                <div class="fw-bold">16:00</div>
                <div class="small">Doma</div>
              </div>
              <div class="badge text-start p-2 border-start border-4 border-success bg-success bg-opacity-10 text-success rounded-1">
                <div class="fw-bold">18:00</div>
                <div class="small">Alquiler Pista</div>
              </div>
            </div>
          </div>

          <div class="col border-end border-light-subtle px-1"></div>
          <div class="col border-end border-light-subtle px-1"></div>
          <div class="col px-1"></div>
        </div>
      </div>
    </div>

    <div class="col-lg-3">
      <div class="card border-0 shadow-sm rounded-3xl p-4 bg-light bg-opacity-50">
        <h3 class="h6 fw-bold mb-4 text-forest uppercase tracking-wider" th:text="#{schedule.form.title}">
          Nueva Reserva
        </h3>
        
        <form class="vstack gap-3">
          <div class="form-group">
            <label class="form-label small fw-bold text-muted">Alumno</label>
            <select class="form-select border-0 shadow-sm py-2">
              <option th:text="#{schedule.form.select_student}">Seleccionar Alumno</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label small fw-bold text-muted">Actividad</label>
            <select class="form-select border-0 shadow-sm py-2">
              <option th:text="#{activity.dressage}">Doma</option>
              <option th:text="#{activity.jump}">Salto</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label small fw-bold text-muted">Fecha y Hora</label>
            <input type="datetime-local" class="form-control border-0 shadow-sm py-2" />
          </div>

          <button type="button" 
                  class="btn btn-warning w-100 py-3 rounded-xl fw-bold text-white shadow-sm hover:shadow-lg transition-all"
                  th:text="#{schedule.button.book}">
            Agendar
          </button>
        </form>
      </div>
      
      <div class="card border-0 bg-forest text-white mt-4 p-4 rounded-3xl shadow-sm">
        <p class="small m-0 opacity-75">Ocupación hoy</p>
        <h4 class="fw-bold">85%</h4>
        <div class="progress h-1 bg-white bg-opacity-20 mt-2">
          <div class="progress-bar bg-sand" style="width: 85%"></div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
