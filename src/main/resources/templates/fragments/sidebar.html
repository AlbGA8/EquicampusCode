<aside th:fragment="sidebar" id="sidebar" class="sidebar">
  <div class="p-6">
    <div class="flex items-center space-x-3 mb-10">
      <div class="logo-container">
        <i class="fas fa-horse-head text-3xl text-white"></i>
      </div>
      <span class="text-xl font-bold text-white tracking-tight"
        >Equi<span class="text-sand">Campus</span></span
      >
    </div>

    <nav class="space-y-1">
      <div
        onclick="switchView('dashboard')"
        class="nav-item active"
        data-view="dashboard"
      >
        <i class="fas fa-th-large text-center w-6 mr-3"></i>
        <span th:text="#{menu.dashboard}">Dashboard</span>
      </div>
      <div
        onclick="switchView('pupilajes')"
        class="nav-item"
        data-view="pupilajes"
      >
        <i class="fas fa-horse-head text-center w-6 mr-3"></i>
        <span th:text="#{menu.stables}">Pupilajes</span>
      </div>
      <div onclick="switchView('clases')" class="nav-item" data-view="clases">
        <i class="fas fa-calendar-check text-center w-6 mr-3"></i>
        <span th:text="#{menu.classes}">Clases</span>
      </div>
      <div onclick="switchView('pistas')" class="nav-item" data-view="pistas">
        <i class="fas fa-map-marked-alt text-center w-6 mr-3"></i>
        <span th:text="#{menu.arenas}">Pistas</span>
      </div>
      <div onclick="switchView('alumnos')" class="nav-item" data-view="alumnos">
        <i class="fas fa-user-graduate text-center w-6 mr-3"></i>
        <span th:text="#{menu.students}">Alumnos</span>
      </div>
      <div
        onclick="switchView('profesores')"
        class="nav-item"
        data-view="profesores"
      >
        <i class="fas fa-chalkboard-teacher text-center w-6 mr-3"></i>
        <span th:text="#{menu.teachers}">Profesorado</span>
      </div>
      <div onclick="switchView('pagos')" class="nav-item" data-view="pagos">
        <i class="fas fa-credit-card text-center w-6 mr-3"></i>
        <span th:text="#{menu.payments}">Pagos</span>
      </div>

      <div class="pt-10 border-t border-white/10 mt-6">
        <div class="nav-item opacity-60">
          <i class="fas fa-cog text-center w-6 mr-3"></i>
          <span th:text="#{menu.settings}">Configuración</span>
        </div>
        <div onclick="logout()" class="nav-item text-red-300">
          <i class="fas fa-sign-out-alt text-center w-6 mr-3"></i>
          <span th:text="#{menu.logout}">Salir</span>
        </div>
      </div>
    </nav>
  </div>
</aside>
