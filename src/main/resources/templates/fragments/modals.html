<div th:fragment="app-modals">
  
  <div th:fragment="modal-nuevo-alumno" id="modal-nuevo-alumno" class="modal-overlay active">
    <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden relative transform transition-all">
      
      <div class="bg-forest p-4 d-flex justify-content-between align-items-center">
        <h3 class="text-white font-bold m-0" th:text="#{student.form.title}">REGISTRAR ALUMNO</h3>
        <button type="button" onclick="document.getElementById('contenedor-modales').innerHTML = ''" 
                class="btn-close btn-close-white shadow-none"></button>
      </div>

      <div class="p-8">
        <form hx-post="/web/alumnos/nuevo" hx-target="body" th:object="${alumno}">
          
          <div class="mb-4">
            <label class="form-label text-xs font-bold text-muted uppercase tracking-wider mb-2" th:text="#{student.form.label.name}">Nombre</label>
            <div class="input-group shadow-sm">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-user"></i></span>
              <input type="text" th:field="*{nombre}" required
                     class="form-control border-start-0 rounded-end-lg py-2 focus:ring-0 focus:border-forest"
                     th:placeholder="#{student.form.placeholder.name}" />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label text-xs font-bold text-muted uppercase tracking-wider mb-2" th:text="#{student.form.label.surname}">Apellido</label>
            <div class="input-group shadow-sm">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-signature"></i></span>
              <input type="text" th:field="*{apellido}" required
                     class="form-control border-start-0 rounded-end-lg py-2 focus:ring-0 focus:border-forest"
                     th:placeholder="#{student.form.placeholder.surname}" />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label text-xs font-bold text-muted uppercase tracking-wider mb-2" th:text="#{student.form.label.email}">Email</label>
            <div class="input-group shadow-sm">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-envelope"></i></span>
              <input type="email" th:field="*{email}" required
                     class="form-control border-start-0 rounded-end-lg py-2 focus:ring-0 focus:border-forest"
                     th:placeholder="#{student.form.placeholder.email}" />
            </div>
          </div>

          <div class="mb-5">
            <div class="input-group shadow-sm">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-chalkboard-user"></i></span>
              <select th:field="*{profesor}" required class="form-select border-start-0 focus:ring-0">
                <option value="" th:text="#{student.form.placeholder.teacher}">Asignar Profesor</option>
                <option th:each="profe : ${profesores}" th:value="${profe.profesorId}" 
                        th:text="${profe.nombre + ' ' + profe.apellido}"></option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-lg w-full bg-forest text-white font-bold rounded-xl py-3 shadow-md hover:opacity-90 transition-all transform hover:-translate-y-0.5 d-flex align-items-center justify-content-center gap-2">
            <i class="fas fa-save"></i>
            <span th:text="#{generic.button.save}">Guardar Alumno</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <div th:fragment="modal-eliminar-alumno" class="modal-overlay active">
    <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden relative">
      <div class="bg-danger p-4 d-flex justify-content-between align-items-center text-white">
        <h3 class="font-bold m-0 d-flex align-items-center gap-2">
          <i class="fas fa-exclamation-triangle"></i> Confirmar Eliminación
        </h3>
        <button type="button" onclick="document.getElementById('contenedor-modales').innerHTML = ''" class="btn-close btn-close-white"></button>
      </div>

      <div class="p-8 text-center">
        <p class="text-muted mb-4">
          ¿Estás seguro de eliminar a este alumno?
          <span class="d-block text-danger fw-bold mt-2">Esta acción no se puede deshacer.</span>
        </p>

        <div class="d-flex gap-3">
          <button type="button" onclick="document.getElementById('contenedor-modales').innerHTML = ''" 
                  class="btn btn-light flex-fill py-3 rounded-xl font-bold">Cancelar</button>
          <button type="button" th:hx-delete="'/web/alumnos/eliminar/' + ${id}" hx-target="body" 
                  class="btn btn-danger flex-fill py-3 rounded-xl font-bold">Sí, Eliminar</button>
        </div>
      </div>
    </div>
  </div>
</div>
