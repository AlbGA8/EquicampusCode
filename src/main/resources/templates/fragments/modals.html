<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="app-modals">
      <div id="modal-nuevo-alumno" class="modal-overlay">
        <div
          class="bg-white rounded-3xl w-full max-w-lg p-0 shadow-2xl relative overflow-hidden transform transition-all scale-100"
        >
          <div class="bg-forest p-4 flex justify-between items-center">
            <h3
              class="text-white font-bold text-lg"
              th:text="#{student.form.title}"
            >
              REGISTRAR ALUMNO
            </h3>
            <button
              onclick="closeModal('modal-nuevo-alumno')"
              class="text-white hover:text-sand transition"
            >
              <i class="fas fa-times text-xl"></i>
            </button>
          </div>
          <div class="p-8">
            <form
              th:action="@{/web/alumnos/nuevo}"
              th:object="${alumno}"
              method="POST"
              class="space-y-5"
            >
              <div>
                <label
                  class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2"
                  th:text="#{student.form.label.name}"
                  >Nombre</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
                    ><i class="fas fa-user"></i
                  ></span>
                  <input
                    type="text"
                    th:field="*{nombre}"
                    required
                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:border-[var(--forest-green)] focus:ring-1 focus:ring-[var(--forest-green)] transition-all"
                    th:placeholder="#{student.form.placeholder.name}"
                  />
                </div>
              </div>
              <div>
                <label
                  class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2"
                  th:text="#{student.form.label.surname}"
                  >Apellido</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
                    ><i class="fas fa-signature"></i
                  ></span>
                  <input
                    type="text"
                    th:field="*{apellido}"
                    required
                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:border-[var(--forest-green)] focus:ring-1 focus:ring-[var(--forest-green)] transition-all"
                    th:placeholder="#{student.form.placeholder.surname}"
                  />
                </div>
              </div>
              <div>
                <label
                  class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2"
                  th:text="#{student.form.label.email}"
                  >Email</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
                    ><i class="fas fa-envelope"></i
                  ></span>
                  <input
                    type="email"
                    th:field="*{email}"
                    required
                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:border-[var(--forest-green)] focus:ring-1 focus:ring-[var(--forest-green)] transition-all"
                    th:placeholder="#{student.form.placeholder.email}"
                  />
                </div>
              </div>
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 pointer-events-none"
                  ><i class="fas fa-chalkboard-user"></i
                ></span>
                <select
                  th:field="*{profesor}"
                  required
                  class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:border-[var(--forest-green)] focus:ring-1 focus:ring-[var(--forest-green)] transition-all appearance-none"
                >
                  <option
                    value=""
                    th:text="#{student.form.placeholder.teacher}"
                  ></option>
                  <option
                    th:each="profe : ${profesores}"
                    th:value="${profe.profesorId}"
                    th:text="${profe.nombre + ' ' + profe.apellido}"
                  ></option>
                </select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400"
                >
                  <i class="fas fa-chevron-down text-xs"></i>
                </div>
              </div>
              <div class="pt-4">
                <button
                  type="submit"
                  class="w-full bg-forest text-white font-bold py-3 rounded-lg shadow-md hover:bg-opacity-90 transform hover:-translate-y-0.5 transition-all duration-200 flex justify-center items-center gap-2"
                >
                  <i class="fas fa-save"></i>
                  <span th:text="#{generic.button.save}">Guardar Alumno</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div id="modal-exito" class="modal-overlay" th:if="${param.exito}">
        <div
          class="bg-white rounded-3xl w-full max-w-sm p-8 text-center shadow-2xl"
        >
          <div
            class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-100 mb-6 shadow-sm"
          >
            <i class="fas fa-check text-4xl text-green-600"></i>
          </div>
          <h2
            class="text-2xl font-bold text-forest mb-3"
            th:text="#{student.created.title}"
          >
            ¡Éxito!
          </h2>
          <p class="text-gray-500 mb-8" th:text="#{student.created.message}">
            Operación realizada correctamente.
          </p>
          <button
            onclick="closeModal('modal-exito')"
            class="w-full bg-forest text-white font-bold py-3 rounded-lg hover:bg-opacity-90"
            th:text="#{generic.button.understood}"
          >
            Entendido
          </button>
        </div>
      </div>
      <div id="modal-nuevo-profesor" class="modal-overlay">
        <div
          class="bg-white rounded-3xl w-full max-w-lg p-0 shadow-2xl relative overflow-hidden transform transition-all scale-100"
        >
          <div class="bg-forest p-4 flex justify-between items-center">
            <h3
              class="text-white font-bold text-lg"
              th:text="#{teacher.form.title}"
            >
              REGISTRAR PROFESOR
            </h3>
            <button
              onclick="closeModal('modal-nuevo-profesor')"
              class="text-white hover:text-sand transition"
            >
              <i class="fas fa-times text-xl"></i>
            </button>
          </div>
          <div class="p-8">
            <form
              th:action="@{/web/profesores/nuevo}"
              th:object="${profesor}"
              method="POST"
              class="space-y-5"
            >
              <div>
                <label
                  class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2"
                  th:text="#{teacher.form.label.name}"
                  >Nombre</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
                    ><i class="fas fa-user"></i
                  ></span>
                  <input
                    type="text"
                    th:field="*{nombre}"
                    required
                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:border-[var(--forest-green)] focus:ring-1 focus:ring-[var(--forest-green)] transition-all"
                    th:placeholder="#{teacher.form.placeholder.name}"
                  />
                </div>
              </div>

              <div>
                <label
                  class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2"
                  th:text="#{teacher.form.label.surname}"
                  >Apellido</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
                    ><i class="fas fa-signature"></i
                  ></span>
                  <input
                    type="text"
                    th:field="*{apellido}"
                    required
                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:border-[var(--forest-green)] focus:ring-1 focus:ring-[var(--forest-green)] transition-all"
                    th:placeholder="#{teacher.form.placeholder.surname}"
                  />
                </div>
              </div>

              <div class="pt-4">
                <button
                  type="submit"
                  class="w-full bg-forest text-white font-bold py-3 rounded-lg shadow-md hover:bg-opacity-90 transform hover:-translate-y-0.5 transition-all duration-200 flex justify-center items-center gap-2"
                >
                  <i class="fas fa-save"></i>
                  <span th:text="#{generic.button.save}">Guardar Profesor</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div id="modal-caballo" class="modal-overlay">
        <div
          class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl relative"
        >
          <button
            onclick="closeModal('modal-caballo')"
            class="absolute top-4 right-4 text-gray-400 hover:text-red-500"
          >
            <i class="fas fa-times"></i>
          </button>
          <h3
            class="text-xl font-bold text-forest mb-4"
            th:text="#{horse.form.title}"
          >
            Nuevo Caballo
          </h3>
          <form class="space-y-4">
            <input
              type="text"
              th:placeholder="#{horse.form.name}"
              class="w-full p-3 bg-gray-50 border rounded-xl"
            />
            <button
              type="button"
              onclick="closeModal('modal-caballo')"
              class="w-full bg-forest text-white py-3 rounded-xl font-bold"
              th:text="#{generic.button.save}"
            >
              Guardar
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
