<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <link rel="icon" href="/imagenes/LogoEquiCampus.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EquiCampus - Acceso Gestión Hípica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      
      :root {
        --forest-green: #2d5a3f;
        --sand-gold: #d4b081;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .bg-forest {
        background-color: var(--forest-green);
      }
      .text-forest {
        color: var(--forest-green);
      }
      .text-sand {
        color: var(--sand-gold);
      }

      #login-screen {
        background:
          linear-gradient(rgba(45, 90, 63, 0.9), rgba(45, 90, 63, 0.9)),
          url("https://images.unsplash.com/photo-1553284965-83fd3e82fa5a?auto=format&fit=crop&w=1350&q=80");
        background-size: cover;
        background-position: center;
      }

      .login-card {
        background: white;
        border-radius: 1.5rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div
      id="login-screen"
      class="fixed inset-0 z-[100] flex items-center justify-center p-4"
    >
      <div class="bg-white rounded-3xl shadow-lg w-full max-w-[400px] p-10 text-center">
        <div class="mb-8">
          <img
            th:src="@{/imagenes/LogoEquiCampus.png}"
            alt="Logo"
            class="mx-auto mb-4 h-16"
            onerror="
              this.outerHTML =
                '<div class=\'w-16 h-16 bg-forest rounded-2xl mx-auto flex items-center justify-center mb-4\'><i class=\'fas fa-horse text-white text-3xl\'></i></div>'
            "
          />
          <h2 class="text-3xl font-extrabold text-forest">
            Equi<span class="text-sand">Campus</span>
          </h2>
          <p class="text-gray-500 text-sm mt-2">
            Acceso Gestión de Centros Hípicos
          </p>
        </div>

        <div
          th:if="${param.error}"
          class="alert alert-danger d-flex align-items-center rounded-xl py-2 mb-4 text-start" role="alert">
          <i class="fas fa-times-circle me-2"></i> 
          <div style="font-size: 0.75rem;">Usuario o contraseña incorrectos</div>
        </div>

        <div
          th:if="${param.logout}"
          class="alert alert-info d-flex align-items-center rounded-xl py-2 mb-4 text-start" role="alert">
          <i class="fas fa-info-circle me-2"></i> 
          <div style="font-size: 0.75rem;">Sesión cerrada con éxito</div>
        </div>

        <form th:action="@{/login}" method="post">
          <div class="mb-3 text-start">
            <label class="form-label text-forest small font-bold px-1">Usuario</label>
            <input type="text" name="username" required
                   class="form-control form-control-lg border-gray-200 rounded-xl focus:border-forest focus:ring-0 transition-all text-base"
                   placeholder="Email o Usuario"/>
          </div>

          <div class="mb-4 text-start">
            <label class="form-label text-forest small font-bold px-1">Contraseña</label>
            <input type="password" name="password" required
                   class="form-control form-control-lg border-gray-200 rounded-xl focus:border-forest focus:ring-0 transition-all text-base"
                   placeholder="••••••••"/>
          </div>

          <button
            type="submit"
            class="btn btn-lg w-full bg-forest text-white rounded-xl py-3 font-bold hover:shadow-xl hover:opacity-90 transition-all transform hover:-translate-y-1"
          >
            Entrar
          </button>
        </form>

        <div class="mt-4">
          <a
            href="#"
            class="text-decoration-none text-muted small hover:text-forest transition font-medium"
            >¿Olvidaste tu contraseña?</a
          >
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
