<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{student.list.title}">Directorio de Alumnos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
      :root {
        --forest-green: #2d5a3f;
        --sand-gold: #d4b081;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #ffffff;
        color: #1e293b; /* Slate-800 para mejor lectura */
        margin: 0;
      }

      .text-forest {
        color: var(--forest-green);
      }

      /* --- ESTILO DE TABLA PARA AHORRO DE TINTA --- */
      table {
        width: 100%;
        border-spacing: 0;
        border-collapse: collapse;
      }

      /* Cabecera limpia: sin fondo oscuro, solo línea divisoria */
      thead th {
        color: var(--forest-green) !important;
        text-transform: uppercase;
        font-size: 0.7rem;
        letter-spacing: 0.05em;
        border-bottom: 2px solid var(--forest-green);
        background-color: #ffffff !important;
        padding: 12px 16px;
      }

      /* Filas con cebra muy tenue */
      tbody tr:nth-child(even) {
        background-color: #fcfcfc;
      }

      tbody td {
        border-bottom: 1px solid #f1f5f9;
        padding: 12px 16px;
      }

      .custom-card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
      }

      /* Ajustes de impresión */
      @media print {
        body { pading: 0; }
        .no-print { display: none !important; }
        .custom-card { border: none; }
        .view-section { animation: none; }
      }
    </style>
  </head>
  <body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto view-section">    

      <div class="flex justify-between items-end mb-8 border-b-2 border-gray-100 pb-4">
        <div>
          <h1 class="text-2xl font-bold text-forest uppercase tracking-tight" th:text="#{student.list.title}">
            Directorio de Alumnos
          </h1>
          <p class="text-gray-400 text-xs mt-1 italic">
            Documento oficial de gestión • Generado el <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy HH:mm')}">01/01/2026</span>
          </p>
        </div>
        <div class="text-right">
          <i class="fa-solid fa-graduation-cap text-3xl text-gray-300"></i>
        </div>
      </div>

      <div class="custom-card">
        <div class="overflow-x-auto">
          <table>
            <thead>
              <tr>
                <th th:text="#{student.table.header.id}">ID</th>
                <th th:text="#{student.table.header.name}">Nombre</th>
                <th th:text="#{student.table.header.surname}">Apellido</th>
                <th th:text="#{student.table.header.email}">Email</th>
                <th class="text-center no-print">Acciones</th>
              </tr>
            </thead>
            <tbody class="text-sm">
              <tr th:each="alumno : ${alumnos}">
                <td class="font-semibold text-gray-700" th:text="${alumno.alumnoId}">1</td>
                <td class="text-gray-600" th:text="${alumno.nombre}">Juan</td>
                <td class="text-gray-600" th:text="${alumno.apellido}">Pérez</td>
                <td class="text-gray-500" th:text="${alumno.email}">juan@ejemplo.com</td>
                <td class="text-center no-print">
                  <span class="text-gray-300">---</span>
                </td>
              </tr>
              
              <tr th:if="${#lists.isEmpty(alumnos)}">
                <td colspan="5" class="p-8 text-center text-gray-400 italic">
                  No se encontraron registros de alumnos.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="mt-8 flex justify-between items-center text-[10px] text-gray-400 uppercase tracking-widest">
        <p>© Escuela de Equitación - Sistema de Gestión</p>
        <p th:text="'Total registros: ' + ${#lists.size(alumnos)}">Total registros: 0</p>
      </div>
    </div>
  </body>
</html>
