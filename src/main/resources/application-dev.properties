restclient.productos.baseurl=http://localhost:8082/alumnos
server.port=8082  
  
# Internacionalización
spring.messages.encoding=UTF-8
spring.messages.basename=messages

# Logs detallados del framework
logging.level.org.springframework=DEBUG

spring.mvc.hiddenmethod.filter.enabled=true

# Mapeo de URLs y vistas (debug 404)
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.view=DEBUG

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración optimizada para desarrollo
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Logging SQL
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG

# Conexión a la base de datos
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/store_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.application.name=alumn-service


