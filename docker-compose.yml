
services:
  db:
    image: mysql:8.0
    container_name: mysql_alumn
    restart: always
    environment:
      MYSQL_DATABASE: store_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s       # Revisa cada 10 segundos
      timeout: 5s        # Espera 5 segundos por respuesta
      retries: 10         # Inténtalo hasta 10 veces antes de rendirte
      start_period: 60s   # <--- MUY IMPORTANTE: Ignora fallos durante el primer minuto

  adminer:
    image: adminer
    restart: always
    ports:
      - "8090:8080"

  alumnos-service:
    image: albagarcia1605/equicampus:v2
    container_name: equicampus-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8082"